<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognizant University - Faculty Login</title>

    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="faculty-login.css">
</head>

<body>
<div class="login-container">

    <!-- LOGIN PAGE -->
    <div id="login-view">
        <div class="header">
            <div class="logo">
                <i data-lucide="shield"></i>
                <span>Cognizant University</span>
            </div>
            <h1>Faculty Login</h1>
            <p>Access your academic portal</p>
        </div>

        <div id="global-error" class="global-error-card hidden">
            <i data-lucide="alert-triangle"></i>
            <span id="global-error-text"></span>
        </div>

        <form id="faculty-secure-form">
            <div class="form-group" id="user-group">
                <label>Username / Email ID</label>
                <input type="text" id="username" class="form-input" placeholder="faculty123">
                <div id="user-error" class="field-error hidden"></div>
            </div>

            <div class="form-group" id="pass-group">
                <label>Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••">
                <div id="pass-error" class="field-error hidden"></div>
            </div>

            <div class="utility-row">
                <label class="remember-me">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" id="forgot-link" class="forgot-link">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-submit">
                Sign In <i data-lucide="arrow-right-circle"></i>
            </button>
        </form>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard-view" class="dashboard-layout hidden">
        <div class="dash-badge">
            <i data-lucide="check"></i>
        </div>
        <h2>Welcome Back</h2>
        <p id="dash-text"></p>
        <button class="btn-logout" id="logout-btn">Log Out</button>
    </div>

    <div class="footer">
        Institutional Core Network &copy; 2026
    </div>
</div>

<!-- JS -->
<script src="faculty-login.js"></script>
</body>
</html>
