 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognizant University - Portal Registration</title>


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    


    <script src="https://unpkg.com/lucide@latest"></script>


    <link rel="stylesheet" href="register.css">
</head>

<body>

<div class="register-container">


    <div id="register-view">
        <div class="header">
            <div class="logo">
                <i data-lucide="user-plus"></i>
                <span>Cognizant University</span>
            </div>
            <h1>Create Account</h1>
            <p>Register your institutional credentials</p>
        </div>

        <form id="registration-form" novalidate>
            <div class="form-group" id="name-group">
                <label>Full Name</label>
                <input type="text" id="fullname" class="form-input" placeholder="John Doe">
                <div id="name-error" class="field-error hidden"></div>
            </div>

            <div class="form-group" id="email-group">
                <label>Institutional Email</label>
                <input type="email" id="email" class="form-input" placeholder="johndoe@cognizant.edu">
                <div id="email-error" class="field-error hidden"></div>
            </div>

            <div class="form-group" id="pass-group">
                <label>Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••">
                <div id="pass-error" class="field-error hidden"></div>
            </div>

            <div class="form-group" id="confirm-group">
                <label>Confirm Password</label>
                <input type="password" id="confirm-password" class="form-input" placeholder="••••••••">
                <div id="confirm-error" class="field-error hidden"></div>
            </div>

            <button type="submit" class="btn-submit">
                Complete Registration
                <i data-lucide="check-circle" style="width:16px;height:16px;"></i>
            </button>
        </form>

        <div class="login-prompt">
            Already registered?
            <a href="../student-login/student-login.html" class="login-link">Sign In here</a>
        </div>
    </div>

    <div id="success-view" class="success-layout hidden">
        <div class="success-badge">
            <i data-lucide="shield-check" style="width:28px;height:28px;"></i>
        </div>
        <h2>Registration Complete</h2>
        <p class="success-text">
            Your account system node has been provisioned successfully.
        </p>
        <a href="../student-login/student-login.html" class="btn-submit" style="text-decoration:none;">
            Proceed to Student Login
        </a>
    </div>

</div>

<script src="register.js"></script>
</body>
</html>
