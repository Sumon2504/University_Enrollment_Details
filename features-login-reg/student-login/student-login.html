<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognizant University - Student Login</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="student-login.css">
</head>
<body>

<div class="login-container">
    <div id="login-view">
        <div class="header">
            <div class="logo">
                <i data-lucide="graduation-cap"></i>
                <span>Cognizant University</span>
            </div>
            <h1>Student Login</h1>
            <p>Access your student dashboard</p>
        </div>

        <div id="global-error" class="global-error-card hidden">
            <i data-lucide="alert-triangle" style="width:16px;height:16px;"></i>
            <span id="global-error-text">Error</span>
        </div>

        <form id="student-secure-form">
            <div class="form-group" id="user-group">
                <label>Student ID / Email</label>
                <input type="text" id="username" class="form-input" placeholder="e.g. student123">
                <div id="user-error" class="field-error hidden"></div>
            </div>

            <div class="form-group" id="pass-group">
                <label>Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••">
                <div id="pass-error" class="field-error hidden"></div>
            </div>

            <div class="utility-row">
                <label class="remember-me">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" class="forgot-link" id="forgot-btn">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-submit">
                Sign In <i data-lucide="arrow-right-circle"></i>
            </button>
        </form>

        <div class="register-prompt">
            New to the university?
            <a href="r.html" class="register-link">Register here</a>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard-view" class="dashboard-layout hidden">
        <div class="dash-badge">
            <i data-lucide="check"></i>
        </div>
        <h2>Welcome Back</h2>
        <p id="dash-text"></p>
        <button class="btn-logout" id="logout-btn">Log Out</button>
    </div>

    <div class="footer">
        Institutional Core Network &copy; 2026
    </div>
</div>

<script src="student-login.js"></script>
</body>
</html>
